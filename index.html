<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ahmad AI Chat</title>

  <!-- Your existing CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body onload="startChat()">

<header>
  <h1>Ahmad AI Chat</h1>
</header>

<div class="chat-container">
  <div id="chatBox"></div>
  <input type="text" id="userInput" placeholder="Type a message..." onkeydown="enterSend(event)">
  <div class="buttons">
    <button onclick="sendMessage()">Send</button>
    <button onclick="clearChat()">Clear</button>
    <input type="color" id="colorInput" onchange="changeBackground()" title="Pick background color">
  </div>
</div>

<!-- JS -->
<script src="script.js"></script>
</body>
</html>
