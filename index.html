<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ahmad AI Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="startChat(); setBackgroundByTime();">

  <!-- Header -->
  <header>
    <h1>Ahmad AI</h1>
  </header>

  <!-- Chat container -->
  <main class="chat-container">
    <div id="chatBox" class="chat-box"></div>
    <input type="text" id="userInput" placeholder="Type a message..." onkeydown="enterSend(event)">
    <div class="buttons">
      <button type="button" onclick="sendMessage()">Send</button>
      <button type="button" onclick="clearChat()">Clear</button>
      <input type="color" id="colorInput" onchange="changeBackground()" title="Pick background color">
    </div>
  </main>

  <!-- Note under chat -->
  <footer class="chat-note">
    Ahmad AI can make mistakes.
  </footer>

  <!-- Scripts -->
  <script src="script.js"></script>
  <script>
    // Automatic background based on time
    function setBackgroundByTime() {
      const hour = new Date().getHours();
      if (hour >= 6 && hour < 18) {
        document.body.style.backgroundColor = "#ffffff"; // morning/day
      } else {
        document.body.style.backgroundColor = "#222222"; // night
      }
    }
  </script>

</body>
</html>
