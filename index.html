<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ahmad AI Chat & Chess</title>

  <!-- Chessboard CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">

  <!-- Your styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body onload="startChat()">

<header>
  <h1>Ahmad AI Chat & Chess</h1>
</header>

<div class="chat-container">
  <div id="chatBox"></div>
  <input type="text" id="userInput" placeholder="Type a message..." onkeydown="enterSend(event)">
  <div class="buttons">
    <button onclick="sendMessage()">Send</button>
    <button onclick="clearChat()">Clear</button>
    <input type="color" id="colorInput" onchange="changeBackground()" title="Pick background color">
  </div>
</div>

<div id="chessBoardContainer"></div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

<!-- Stockfish WebAssembly -->
<script src="stockfish.wasm.js"></script>

<!-- Your JS -->
<script src="script.js"></script>

</body>
</html>
