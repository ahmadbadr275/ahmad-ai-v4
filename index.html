DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ahmad AI Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="startChat()">

  <!-- Header with logo -->
  <header>
    <img src="logo.png" alt="Ahmad AI Logo" class="logo">
    <h1>Ahmad AI</h1>
  </header>

  <!-- Chat container -->
  <div class="chat-container">
    <div id="chatBox" class="chat-box"></div>
    <input type="text" id="userInput" placeholder="Type a message..." onkeydown="enterSend(event)">
    <div class="buttons">
      <button onclick="sendMessage()">Send</button>
      <button onclick="clearChat()">Clear</button>
      <input type="color" id="colorInput" onchange="changeBackground()" title="Pick background color">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
